name: Daily BB+EMA Stock Scanner

on:
  schedule:
    - cron: '30 16 * * 1-5'  # 10:00 PM IST = 4:30 PM UTC, Mon-Fri
  workflow_dispatch:           # manual trigger from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python run_scanner.py --universe NSE_ALL
        env:
          UPSTOX_TOKEN:     ${{ secrets.UPSTOX_TOKEN }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Send Telegram notification
        run: python notify_telegram.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
